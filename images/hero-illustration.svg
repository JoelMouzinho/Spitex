<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcebd8"/>
      <stop offset="100%" stop-color="#a9c9a3"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fff6df" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff6df" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pathFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e7d3ad"/>
      <stop offset="100%" stop-color="#c9a877"/>
    </linearGradient>
  </defs>

  <rect width="800" height="900" fill="url(#skyFade)"/>
  <circle cx="420" cy="220" r="260" fill="url(#sunGlow)"/>

  <!-- distant tree layer -->
  <g opacity="0.35" fill="#5c7d55">
    <ellipse cx="90" cy="330" rx="90" ry="220"/>
    <ellipse cx="230" cy="300" rx="70" ry="260"/>
    <ellipse cx="600" cy="290" rx="80" ry="250"/>
    <ellipse cx="730" cy="330" rx="95" ry="220"/>
  </g>

  <!-- mid tree layer -->
  <g opacity="0.55" fill="#3f6b45">
    <ellipse cx="40" cy="420" rx="110" ry="300"/>
    <ellipse cx="190" cy="380" rx="90" ry="330"/>
    <ellipse cx="640" cy="380" rx="95" ry="330"/>
    <ellipse cx="780" cy="420" rx="110" ry="300"/>
  </g>

  <!-- winding path -->
  <path d="M300,900 C340,760 260,660 340,540 C400,450 380,380 420,300 C440,260 420,220 400,180"
        fill="none" stroke="url(#pathFade)" stroke-width="130" stroke-linecap="round" opacity="0.9"/>
  <path d="M300,900 C340,760 260,660 340,540 C400,450 380,380 420,300 C440,260 420,220 400,180"
        fill="none" stroke="#b5915f" stroke-width="4" stroke-dasharray="2 22" stroke-linecap="round" opacity="0.5"/>

  <!-- foreground tree trunks -->
  <g fill="#2c4a2e">
    <rect x="60" y="520" width="26" height="380" rx="8"/>
    <rect x="700" y="500" width="30" height="400" rx="8"/>
    <rect x="150" y="600" width="18" height="300" rx="6"/>
    <rect x="640" y="620" width="16" height="280" rx="6"/>
  </g>

  <!-- foreground foliage -->
  <g opacity="0.9" fill="#264a2b">
    <ellipse cx="70" cy="480" rx="140" ry="220"/>
    <ellipse cx="715" cy="460" rx="150" ry="230"/>
  </g>

  <!-- light rays -->
  <g opacity="0.25" fill="#fff8e6">
    <polygon points="420,80 470,80 520,900 370,900"/>
    <polygon points="380,60 410,60 300,900 250,900"/>
  </g>

  <!-- warmth accent dots referencing brand tree -->
  <g fill="#e8935a" opacity="0.85">
    <circle cx="400" cy="250" r="10"/>
    <circle cx="382" cy="268" r="6"/>
    <circle cx="418" cy="268" r="6"/>
  </g>
</svg>
