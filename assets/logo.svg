<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">Spitex Wohl De Hei Logo</title>
  <defs>
    <linearGradient id="blueArc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b9bd0"/>
      <stop offset="100%" stop-color="#2f6690"/>
    </linearGradient>
    <linearGradient id="orangeArc" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0a570"/>
      <stop offset="100%" stop-color="#d9782f"/>
    </linearGradient>
  </defs>

  <!-- outer embracing arcs (hands) -->
  <path d="M100,14 C55,14 20,45 16,88 C40,60 68,46 100,46 C132,46 160,60 184,88 C180,45 145,14 100,14 Z" fill="url(#blueArc)"/>
  <path d="M100,186 C145,186 180,155 184,112 C160,140 132,154 100,154 C68,154 40,140 16,112 C20,155 55,186 100,186 Z" fill="url(#orangeArc)"/>

  <!-- inner circle backdrop -->
  <circle cx="100" cy="100" r="46" fill="#fdfaf5"/>

  <!-- tree -->
  <g>
    <path d="M100,132 L100,96" stroke="#8a5a34" stroke-width="4" stroke-linecap="round"/>
    <path d="M100,118 L84,108 M100,112 L116,102 M100,124 L88,120" stroke="#8a5a34" stroke-width="3" stroke-linecap="round" fill="none"/>
    <g fill="#e8935a">
      <circle cx="100" cy="80" r="16"/>
      <circle cx="80" cy="92" r="11"/>
      <circle cx="120" cy="92" r="11"/>
      <circle cx="88" cy="70" r="9"/>
      <circle cx="112" cy="70" r="9"/>
    </g>
    <path d="M100,132 C92,138 84,140 76,138 M100,132 C108,138 116,140 124,138" stroke="#4a7ba6" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>
</svg>
